name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli-test:
    name: cli unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
      - run: cd cli && npm ci
      - run: make cli-test

  conformance-linux:
    name: conformance + notes (Linux host + mock)
    runs-on: ubuntu-latest
    env:
      ENGAWA_WERROR: '1'   # promote C++ warnings to errors in CI (opt-in; see engawa-host.cmake)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
      # Linux reference host deps (hosts/linux/README.md, build.sh): GTK3 + WebKitGTK + libsoup +
      # libsodium, plus the CMake/Ninja toolchain and Xvfb (gtk_init needs a live $DISPLAY).
      - name: Install host build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev libsodium-dev \
            xvfb
      # The host renders offscreen with software GL, but gtk_init still needs a display: wrap in Xvfb.
      - name: make conformance
        run: xvfb-run -a make conformance
      - name: make notes
        run: xvfb-run -a make notes

  conformance-macos:
    name: conformance + notes (macOS host + mock)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
      # TEMPORARY: build the host once, then run the suite many times to surface the intermittent
      # macOS host boot exit (code null) and capture its signal via the driver's exit log. Revert
      # to `make conformance` once diagnosed.
      - name: build macOS host
        run: cd hosts/macos && swift build
      - name: conformance x20 (hunt the intermittent boot exit)
        run: for i in $(seq 1 20); do echo "--- run $i ---"; node conformance/run.js || exit 1; done
      - name: make notes
        run: make notes

  conformance-windows:
    name: conformance + notes (Windows host + mock)
    runs-on: windows-latest
    env:
      ENGAWA_WERROR: '1'   # promote C++ warnings to errors in CI (opt-in; see engawa-host.cmake)
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
      # engawa-host.cmake resolves the WebView2 SDK from the nuget GLOBAL packages folder and errors
      # if absent; prime it with a PackageDownload restore (no compile dep, just the cache).
      - name: Prime WebView2 SDK (nuget global cache)
        run: |
          $xml = '<Project Sdk="Microsoft.NET.Sdk"><PropertyGroup><TargetFramework>net8.0</TargetFramework></PropertyGroup><ItemGroup><PackageDownload Include="Microsoft.Web.WebView2" Version="[1.0.4022.49]" /></ItemGroup></Project>'
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP/wv2" | Out-Null
          $xml | Set-Content "$env:RUNNER_TEMP/wv2/wv2.csproj"
          dotnet restore "$env:RUNNER_TEMP/wv2/wv2.csproj"
      - name: Build Windows host
        run: ./hosts/windows/build.ps1
      - name: conformance
        run: node conformance/run.js
      - name: notes
        run: ./examples/notes/gate/gate.ps1
